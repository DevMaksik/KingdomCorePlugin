database:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: kingdomcore
    username: root
    password: ""
    use-ssl: false

economy:
  prefer-vault: true
  starting-balance: 250.0

kingdom:
  create-cost: 500.0
  max-name-length: 18
  min-name-length: 3
  name-regex: "^[A-Za-z0-9_]+$"
  default-member-limit: 12
  home-teleport-delay-seconds: 5
  invite-expire-seconds: 120
  autosave-minutes: 5

upgrades:
  MEMBER_LIMIT:
    max-level: 5
    money-cost: 1000.0
    prestige-cost: 50
    member-bonus-per-level: 4
  EXP_BOOST:
    max-level: 5
    money-cost: 1500.0
    prestige-cost: 80
  DROP_BOOST:
    max-level: 4
    money-cost: 1800.0
    prestige-cost: 100
  CHEAPER_REPAIRS:
    max-level: 3
    money-cost: 1200.0
    prestige-cost: 60
  QUEST_REWARDS:
    max-level: 5
    money-cost: 2000.0
    prestige-cost: 120
  FASTER_HOME:
    max-level: 3
    money-cost: 900.0
    prestige-cost: 40
  BANK_SLOTS:
    max-level: 6
    money-cost: 1100.0
    prestige-cost: 55

quests:
  reset-hour: 4
  daily:
    mob_hunter:
      name: "Łowcy Bestii"
      description: "Zabijcie 100 mobów jako królestwo."
